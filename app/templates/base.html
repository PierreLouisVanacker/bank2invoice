<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}bank2invoice{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <style>
        :root {
            --bg: #fafafa;
            --fg: #1a1a1a;
            --muted: #666;
            --border: #e0e0e0;
            --accent: #2563eb;
            --accent-bg: #eff6ff;
            --green: #16a34a;
            --green-bg: #f0fdf4;
            --amber: #d97706;
            --amber-bg: #fffbeb;
            --red: #dc2626;
            --red-bg: #fef2f2;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }
        nav {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            gap: 24px;
            align-items: center;
        }
        nav a {
            color: var(--fg);
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 4px;
        }
        nav a:hover { background: var(--bg); }
        nav .brand { font-weight: 600; color: var(--accent); }
        main {
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 24px;
        }
        h1, h2, h3 { margin-top: 0; }
        h1 { font-size: 1.6rem; }
        h2 { font-size: 1.2rem; margin-top: 32px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        a { color: var(--accent); }
        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
        }
        .grid {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 8px 16px;
            font-size: 0.95rem;
        }
        .grid dt { color: var(--muted); }
        .grid dd { margin: 0; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .badge.assujetti { background: var(--accent-bg); color: var(--accent); }
        .badge.franchise { background: var(--green-bg); color: var(--green); }
        .badge.parse    { background: var(--green-bg); color: var(--green); }
        .badge.uploaded { background: var(--accent-bg); color: var(--accent); }
        .badge.quarantaine { background: var(--red-bg); color: var(--red); }
        .badge.erreur   { background: var(--red-bg); color: var(--red); }
        .badge.a_valider { background: var(--amber-bg); color: var(--amber); }
        .badge.valide   { background: var(--green-bg); color: var(--green); }
        .badge.exclu    { background: var(--red-bg); color: var(--red); }
        .badge.auto_ok  { background: var(--green-bg); color: var(--green); }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
        }
        .note, .muted {
            font-size: 0.85rem;
            color: var(--muted);
            font-style: italic;
        }
        button {
            background: var(--accent);
            color: white;
            border: 0;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        button.secondary {
            background: white;
            color: var(--fg);
            border: 1px solid var(--border);
        }
        button.danger {
            background: var(--red);
            color: white;
        }

        /* Tables */
        table.data {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            font-size: 0.92rem;
        }
        table.data th {
            background: var(--bg);
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        table.data td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }
        table.data tr:last-child td { border-bottom: 0; }
        table.data tr:hover td { background: var(--bg); }
        table.data tr.error td { background: var(--red-bg); color: var(--red); }
        table.data .num { text-align: right; font-variant-numeric: tabular-nums; }
        table.data .libelle {
            max-width: 340px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 0.82rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Inputs inline dans la table */
        .inline-input {
            width: 100%;
            padding: 4px 6px;
            border: 1px solid transparent;
            border-radius: 4px;
            font-size: inherit;
            font-family: inherit;
            background: transparent;
        }
        .inline-input:hover { border-color: var(--border); background: white; }
        .inline-input:focus {
            border-color: var(--accent);
            background: white;
            outline: none;
        }
        select.inline-input { padding: 3px 4px; }

        /* HTMX feedback : indique qu'une requête est en cours */
        .htmx-request .inline-input { opacity: 0.6; }
        .saved-flash {
            display: inline-block;
            font-size: 0.75rem;
            color: var(--green);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .saved-flash.show { opacity: 1; }

        /* Panneau latéral overlay */
        .panel-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 100;
            display: flex;
            justify-content: flex-end;
        }
        .panel {
            background: white;
            width: 480px;
            max-width: 92vw;
            height: 100%;
            overflow-y: auto;
            box-shadow: -4px 0 16px rgba(0, 0, 0, 0.1);
            padding: 24px;
            animation: slideIn 0.18s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(40px); opacity: 0.5; }
            to { transform: translateX(0); opacity: 1; }
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .panel h2 { margin: 0; font-size: 1.1rem; border: 0; padding: 0; }
        .panel-close {
            background: transparent;
            color: var(--muted);
            border: 0;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 8px;
        }
        .panel-close:hover { color: var(--fg); }

        /* Forms */
        .form-row {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 8px 12px;
            align-items: center;
            margin-bottom: 10px;
        }
        .form-row label { color: var(--muted); font-size: 0.9rem; }
        .form-row input[type="text"],
        .form-row input[type="email"],
        .form-row select,
        .form-row textarea {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.92rem;
        }
        .form-row textarea { min-height: 60px; resize: vertical; }
        .form-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        /* Filtres en haut de table */
        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 16px 0 12px 0;
            flex-wrap: wrap;
        }
        .toolbar label {
            display: flex;
            gap: 6px;
            align-items: center;
            font-size: 0.9rem;
            color: var(--muted);
            cursor: pointer;
        }
        .stat {
            display: inline-block;
            padding: 4px 10px;
            background: var(--bg);
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--muted);
        }
        .stat strong { color: var(--fg); }

        /* Indicateurs de chargement HTMX */
        .htmx-indicator {
            display: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            display: inline-flex;
            opacity: 1;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-row {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.9rem;
        }
        /* Overlay plein écran pour l'upload (qui recharge la page) */
        #upload-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.85);
            z-index: 200;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }
        #upload-overlay.show { display: flex; }
        #upload-overlay .spinner { width: 36px; height: 36px; border-width: 4px; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">bank2invoice</span>
        <a href="/releves">Relevés</a>
        <a href="/factures">Factures</a>
        <a href="/clients">Clients</a>
        <a href="/profil">Profil</a>
        <span style="margin-left: auto; display: flex; align-items: center; gap: 12px;">
            {% if user %}
                <span style="color: var(--muted); font-size: 0.85rem;">{{ user.nom_affichage }}</span>
                <form method="post" action="/logout" style="margin: 0;">
                    <button type="submit" class="secondary" style="font-size: 0.8rem; padding: 4px 10px;">
                        Déconnexion
                    </button>
                </form>
            {% endif %}
        </span>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Panneau latéral : injecté ici par HTMX depuis la table review -->
    <div id="panel-slot"></div>

    <!-- Overlay de chargement plein écran (upload de PDF) -->
    <div id="upload-overlay">
        <div class="spinner"></div>
        <div id="upload-overlay-title" style="color: var(--fg); font-weight: 500;">Analyse du relevé en cours…</div>
        <div id="upload-overlay-sub" class="muted">Lecture du PDF, détection de la banque, extraction des transactions.</div>
    </div>
</body>
</html>
