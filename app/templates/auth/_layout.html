<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}bank2invoice{% endblock %}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: #fafafa;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .auth-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .auth-brand {
            text-align: center;
            color: #2563eb;
            font-weight: 600;
            font-size: 1.4rem;
            margin-bottom: 4px;
        }
        .auth-tagline {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 24px;
        }
        h1 { font-size: 1.2rem; margin: 0 0 16px; }
        .form-row { margin-bottom: 14px; }
        .form-row label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 4px;
        }
        .form-row input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            box-sizing: border-box;
        }
        .form-row input:focus {
            outline: none;
            border-color: #2563eb;
        }
        button[type="submit"] {
            width: 100%;
            background: #2563eb;
            color: white;
            border: 0;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            margin-top: 8px;
        }
        .auth-error {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.88rem;
            margin-bottom: 16px;
        }
        .auth-switch {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #666;
        }
        .auth-switch a { color: #2563eb; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-brand">bank2invoice</div>
        <div class="auth-tagline">Factures depuis relevés bancaires</div>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
